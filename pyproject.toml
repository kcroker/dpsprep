[project]
name = "dpsprep"
version = "2.4.1"
description = "A DjVu to PDF converter with a focus on small output size and the ability to preserve document outlines and text layers"
requires-python = ">=3.11, <4.0"
authors = [
  { name = "Kevin Arthur Schiff Croker" },
  { name = "Ianis Vasilev", email = "ianis@ivasilev.net" }
]
license = "GPL-3.0-or-later"
dependencies = [
  "click (>=8.3.1)",
  "djvulibre-python (>=0.9.3)",
  "fpdf2 (>=2.8.6)",
  "loguru (>=0.7.3)",
  "pdfrw (>=0.4)",
  "pillow (>=12.1.1)"
]

[project.urls]
Repository = "https://github.com/kcroker/dpsprep.git"

[project.optional-dependencies]
compress = [
  "ocrmypdf (>=17.3.0)"
]

[project.scripts]
dpsprep = "dpsprep:dpsprep"

[dependency-groups]
dev = [
  "mypy (>=1.19.1)",
  "pytest (>=9.0.2)",
  "pytest-image-diff (>=0.0.14)",
  "ruff (>=0.15.2)",
  "types-fpdf2 (>=2.8.4.20260221)",
  "types-pillow (>=10.2.0.20240822)",
]

[build-system]
requires = ["uv_build (>=0.10.5, <0.11.0)"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""  # uv-build expects the code to be in src/dpsprep, but I did not want to move it when migrating to uv

[tool.pytest.ini_options]
addopts = "--capture tee-sys"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "A005",
  "COM812",
  "D1", "D203", "D213",
  "E501",
  "FA100",
  "PLC0415",
  "PLR2004",
  "PTH123",
  "Q000",
  "RUF059",
  "S324"
]

[tool.ruff.lint.flake8-quotes]
inline-quotes = "single"

[tool.ruff.lint.per-file-ignores]
"test_*.py" = ["S101"]

[tool.mypy]
packages = ["dpsprep"]

[[tool.mypy.overrides]]
module = [
  "djvu.*",
  "ocrmypdf.*",
  "pdfrw.*",
  "pytest_image_diff.*"
]
ignore_missing_imports = true
